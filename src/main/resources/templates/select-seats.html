<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Seats | BookMyTicket</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	
	/* Proper Colors */
	--color-standard: #10b981; /* Emerald Green */
	--color-premium: #3b82f6;  /* Royal Blue */
	--color-vip: #f59e0b;      /* Golden Orange */
	--color-booked: #374151;
	--color-selected: #f472b6; /* Bright Pink */
}

body {
	font-family: 'Poppins', sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	color: var(--text-main);
	padding: 30px 10px;
}

.container {
	max-width: 1100px;
}

/* ===== SCREEN ===== */
.screen {
	background: linear-gradient(135deg, #6496ff, #ff4081);
	color: white;
	text-align: center;
	padding: 12px;
	border-radius: 12px;
	font-weight: 900;
	letter-spacing: 4px;
	margin-bottom: 50px;
	box-shadow: 0 15px 35px rgba(100, 150, 255, .3);
}

/* ===== ROW ===== */
.row-wrapper {
	display: flex;
	align-items: center;
	margin-bottom: 12px;
}

.row-name {
	width: 50px;
	font-weight: 800;
	color: #94a3b8;
}

/* ===== SEAT ===== */
.seat {
	width: 38px;
	height: 38px;
	margin: 4px;
	border-radius: 10px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: .75rem;
	font-weight: 700;
	cursor: pointer;
	transition: all .2s ease;
	border: 2px solid transparent;
}

/* Category Colors */
.STANDARD { background: rgba(16, 185, 129, 0.15); border-color: var(--color-standard); color: var(--color-standard); }
.PREMIUM { background: rgba(59, 130, 246, 0.15); border-color: var(--color-premium); color: var(--color-premium); }
.VIP { background: rgba(245, 158, 11, 0.15); border-color: var(--color-vip); color: var(--color-vip); }

.booked {
	background: var(--color-booked) !important;
	border-color: #4b5563 !important;
	color: #9ca3af !important;
	cursor: not-allowed;
	opacity: 0.6;
}

.selected {
	background: var(--color-selected) !important;
	border-color: #ec4899 !important;
	color: white !important;
	transform: scale(1.1);
	box-shadow: 0 0 15px rgba(244, 114, 182, 0.5);
}

.seat:not(.booked):hover {
	transform: translateY(-3px);
	filter: brightness(1.2);
}

@keyframes pulse {
	0% { transform: scale(1); }
	50% { transform: scale(1.2); }
	100% { transform: scale(1.1); }
}

/* ===== CONTROLS ===== */
.controls-panel {
	background: rgba(17, 24, 39, 0.6);
	padding: 20px;
	border-radius: 20px;
	border: 1px solid var(--border);
	margin-bottom: 30px;
	display: flex;
	align-items: center;
	gap: 20px;
	justify-content: center;
}

.member-selector {
	display: flex;
	align-items: center;
	gap: 12px;
	background: #020617;
	padding: 8px 15px;
	border-radius: 12px;
	border: 1px solid var(--border);
}

.member-selector select {
	background: transparent;
	border: none;
	color: var(--color-selected);
	font-weight: 800;
	outline: none;
	cursor: pointer;
}

/* ===== LEGEND ===== */
.legend {
	display: flex;
	flex-wrap: wrap;
	gap: 20px;
	justify-content: center;
	margin-top: 30px;
	padding: 15px;
}

.legend-item {
	display: flex;
	align-items: center;
	gap: 10px;
	font-weight: 600;
	cursor: pointer;
	padding: 8px 12px;
	border-radius: 10px;
	transition: background 0.2s;
}

.legend-item:hover { background: rgba(255, 255, 255, 0.05); }
.legend-box { width: 18px; height: 18px; border-radius: 5px; border: 2px solid; }

/* ===== SUMMARY ===== */
.summary-bar {
	position: sticky;
	bottom: 20px;
	margin-top: 40px;
	background: rgba(15, 23, 42, 0.95);
	backdrop-filter: blur(10px);
	border: 1px solid var(--border);
	padding: 20px 30px;
	border-radius: 24px;
	display: flex;
	justify-content: space-between;
	align-items: center;
	box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
}

.amount-text { font-size: 1.5rem; font-weight: 900; color: #fff; }
.amount-text span { color: var(--color-selected); }

.btn-proceed {
	background: linear-gradient(135deg, #ec4899, #db2777);
	color: white;
	border: none;
	padding: 14px 40px;
	border-radius: 16px;
	font-weight: 800;
	box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
	transition: all 0.3s;
}

.btn-proceed:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(236, 72, 153, 0.6); color: white; }

</style>
</head>

<body>

	<div class="container">

		<div class="screen">🎬 SCREEN THIS SIDE 🎬</div>

		<!-- CONTROLS -->
		<div class="controls-panel">
			<div class="member-selector">
				<label>Number of Members:</label>
				<select id="memberCount" onchange="updateTotal()">
					<option th:each="i : ${#numbers.sequence(1, 10)}" th:value="${i}" th:text="${i}"></option>
				</select>
			</div>
			<div class="text-muted" style="font-size: 0.85rem;">Click a category below to auto-select best seats</div>
		</div>

		<form action="/confirm-booking" method="post" id="bookingForm" onsubmit="return prepareSeats()">

			<input type="hidden" name="showId" th:value="${showId}">
			<input type="hidden" id="ticketPrice" th:value="${ticketPrice ?: 250.0}">

			<!-- SEATS -->
			<div th:each="rowEntry : ${seatsByRow}">
				<div class="row-wrapper">
					<div class="row-name" th:text="${rowEntry.key}"></div>
					<div class="d-flex flex-wrap">
						<div th:each="showSeat : ${rowEntry.value}" class="seat"
							th:classappend="${showSeat.seat.category} + (${showSeat.booked} ? ' booked' : '')"
							th:text="${showSeat.seat.seatColumn}" 
							th:data-id="${showSeat.id}"
							th:data-category="${showSeat.seat.category}"
							onclick="toggleSeat(this)"></div>
					</div>
				</div>
			</div>

			<!-- LEGEND -->
			<div class="legend">
				<div class="legend-item" onclick="selectSmart('STANDARD')">
					<div class="legend-box STANDARD"></div>
					<span>Standard</span>
				</div>
				<div class="legend-item" onclick="selectSmart('PREMIUM')">
					<div class="legend-box PREMIUM"></div>
					<span>Premium</span>
				</div>
				<div class="legend-item" onclick="selectSmart('VIP')">
					<div class="legend-box VIP"></div>
					<span>VIP</span>
				</div>
				<div class="legend-item">
					<div class="legend-box" style="background: var(--color-booked); border-color: #4b5563"></div>
					<span>Booked</span>
				</div>
				<div class="legend-item">
					<div class="legend-box" style="background: var(--color-selected); border-color: #ec4899"></div>
					<span>Selected</span>
				</div>
			</div>

			<!-- SUMMARY -->
			<div class="summary-bar">
				<div class="amount-text">
					Total Amount: <span id="displayTotal">₹ 0.00</span>
					<div id="selectionHint" class="text-muted" style="font-size: 0.8rem; font-weight: 400; margin-top: 5px;">
						Selected <span id="seatCount">0</span> of <span id="targetCount">1</span> members
					</div>
				</div>
				<div class="d-flex gap-3">
					<a href="/" class="btn btn-outline-secondary px-4" style="border-radius: 14px; border: 2px solid #334155; font-weight: 700; color: #94a3b8;">Cancel</a>
					<button type="submit" class="btn btn-proceed">Proceed</button>
				</div>
			</div>

		</form>

	</div>

	<script>
function getPrice() {
	const priceVal = document.getElementById('ticketPrice').value;
	return isNaN(parseFloat(priceVal)) ? 250.0 : parseFloat(priceVal);
}

function toggleSeat(el) {
	if (el.classList.contains('booked')) return;
	
	const target = parseInt(document.getElementById('memberCount').value);
	const selectedSeats = document.querySelectorAll('.seat.selected');
	
	if (el.classList.contains('selected')) {
		// If already selected, just turn it off
		el.classList.remove('selected');
	} else {
		// If at limit, remove the FIRST (oldest) selected seat to make room for the new one
		if (selectedSeats.length >= target) {
			selectedSeats[0].classList.remove('selected');
		}
		// Now select the new one
		el.classList.add('selected');
		
		// Add a little pulse animation
		el.style.animation = 'none';
		el.offsetHeight; // trigger reflow
		el.style.animation = 'pulse 0.4s ease-out';
	}
	
	updateTotal();
}

function selectSmart(cat) {
	const target = parseInt(document.getElementById('memberCount').value);
	const allAvailable = document.querySelectorAll(`.seat.${cat}:not(.booked)`);
	
	// Clear current selections first
	document.querySelectorAll('.seat.selected').forEach(s => s.classList.remove('selected'));
	
	// Select only up to the target number
	for(let i=0; i < Math.min(target, allAvailable.length); i++) {
		allAvailable[i].classList.add('selected');
	}
	
	updateTotal();
}

function updateTotal() {
	const target = parseInt(document.getElementById('memberCount').value);
	const selected = document.querySelectorAll('.seat.selected').length;
	const price = getPrice();
	
	const total = (selected * price).toFixed(2);
	document.getElementById('displayTotal').innerText = `₹ ${total}`;
	document.getElementById('seatCount').innerText = selected;
	document.getElementById('targetCount').innerText = target;
	
	const hint = document.getElementById('selectionHint');
	if (selected < target) hint.style.color = "#f87171"; // Red if more needed
	else if (selected == target) hint.style.color = "#4ade80"; // Green if perfect
	else hint.style.color = "#fbbf24"; // Amber if over (unlikely with toggle logic)
}

function prepareSeats() {
	const selected = document.querySelectorAll('.seat.selected');
	const target = parseInt(document.getElementById('memberCount').value);

	if (selected.length === 0) {
		alert("Please select at least one seat");
		return false;
	}
	
	if (selected.length != target) {
		if(!confirm(`You have selected ${selected.length} seats but your members count is ${target}. Proceed anyway?`)) {
			return false;
		}
	}

	const form = document.getElementById('bookingForm');
	// Clear previous inputs if any
	form.querySelectorAll('input[name="seatIds"]').forEach(i => i.remove());
	
	selected.forEach(seat => {
		const input = document.createElement('input');
		input.type = 'hidden';
		input.name = 'seatIds';
		input.value = seat.dataset.id;
		form.appendChild(input);
	});

	return true;
}

// Initial update
document.addEventListener('DOMContentLoaded', updateTotal);
</script>

</body>
</html>
